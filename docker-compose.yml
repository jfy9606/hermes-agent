#
# docker-compose.yml for Hermes Agent
#
# Usage:
#   docker compose up -d --build    # 本地构建并启动
#   docker compose down             # 停止所有服务
#
# Set HERMES_UID / HERMES_GID to the host user that owns ~/.hermes so
# files created inside the container stay readable/writable on the host.
# The entrypoint remaps the internal `hermes` user to these values via
# usermod/groupmod + gosu.
#
# Security notes:
#   - The dashboard service binds to 127.0.0.1 by default. It stores API
#     keys; exposing it on LAN without auth is unsafe. If you want remote
#     access, use an SSH tunnel or put it behind a reverse proxy that
#     adds authentication — do NOT pass --insecure --host 0.0.0.0.
#   - The gateway's API server (port 8642) provides /health for the dashboard.
#     See docs/user-guide/api-server.md before exposing it publicly.
#

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: hermes-agent:local
    container_name: hermes
    restart: unless-stopped
    network_mode: host
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - API_SERVER_ENABLED=true
    env_file:
      - path: ~/.hermes/.env
        required: false
    command: ["gateway", "run"]

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: hermes-agent:local
    container_name: hermes-dashboard
    restart: unless-stopped
    network_mode: host
    depends_on:
      - gateway
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - GATEWAY_HEALTH_URL=http://localhost:8642
    # Binds 0.0.0.0:9119 (LAN accessible). Requires --insecure because the
    # dashboard exposes API keys without robust authentication.
    # For production, use a reverse proxy with auth instead.
    command: ["dashboard", "--host", "0.0.0.0", "--insecure", "--no-open"]
